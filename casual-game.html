<p>무료 캐주얼 게임을 고를 때 중요한 것: 가볍고, 바로 시작되고, 광고가 흐름을 끊지 않을 것. 스택 타워는 6MB의 가벼운 용량에 회원가입도 없고, 강제 전면 광고가 단 하나도 없습니다. 광고는 부활이나 아이템을 원할 때만 내가 선택해서 봅니다. 한 판에 1~2분, 지하철 한 정거장이면 충분합니다.</p>
